<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#00ffff"/>
    </linearGradient>
    <linearGradient id="cg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ffff"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>

  <rect width="64" height="64" fill="#02040f"/>

  <!-- outer diamond -->
  <polygon points="32,4 60,32 32,60 4,32" fill="none" stroke="url(#cg)" stroke-width="1.5"/>

  <!-- inner diamond -->
  <polygon points="32,20 44,32 32,44 20,32" fill="none" stroke="url(#cg)" stroke-width="1" opacity="0.4"/>

  <!-- crosshair lines -->
  <line x1="4"  y1="32" x2="18" y2="32" stroke="#00ffff" stroke-width="1.2" opacity="0.7"/>
  <line x1="46" y1="32" x2="60" y2="32" stroke="#00ffff" stroke-width="1.2" opacity="0.7"/>
  <line x1="32" y1="4"  x2="32" y2="18" stroke="#a855f7" stroke-width="1.2" opacity="0.7"/>
  <line x1="32" y1="46" x2="32" y2="60" stroke="#a855f7" stroke-width="1.2" opacity="0.7"/>

  <!-- corner brackets -->
  <line x1="4"  y1="4"  x2="12" y2="4"  stroke="#00ffff" stroke-width="1.5" opacity="0.6"/>
  <line x1="4"  y1="4"  x2="4"  y2="12" stroke="#00ffff" stroke-width="1.5" opacity="0.6"/>
  <line x1="60" y1="4"  x2="52" y2="4"  stroke="#00ffff" stroke-width="1.5" opacity="0.6"/>
  <line x1="60" y1="4"  x2="60" y2="12" stroke="#00ffff" stroke-width="1.5" opacity="0.6"/>
  <line x1="4"  y1="60" x2="12" y2="60" stroke="#a855f7" stroke-width="1.5" opacity="0.6"/>
  <line x1="4"  y1="60" x2="4"  y2="52" stroke="#a855f7" stroke-width="1.5" opacity="0.6"/>
  <line x1="60" y1="60" x2="52" y2="60" stroke="#a855f7" stroke-width="1.5" opacity="0.6"/>
  <line x1="60" y1="60" x2="60" y2="52" stroke="#a855f7" stroke-width="1.5" opacity="0.6"/>

  <!-- diamond vertex dots -->
  <circle cx="32" cy="4"  r="2" fill="#a855f7"/>
  <circle cx="60" cy="32" r="2" fill="#00ffff"/>
  <circle cx="32" cy="60" r="2" fill="#a855f7"/>
  <circle cx="4"  cy="32" r="2" fill="#00ffff"/>

  <!-- center core -->
  <circle cx="32" cy="32" r="5.5" fill="url(#cg)"/>
  <circle cx="32" cy="32" r="2.5" fill="#02040f"/>
  <circle cx="32" cy="32" r="1"   fill="url(#cg2)"/>
</svg>
